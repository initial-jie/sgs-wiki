  {name:"天机图",suit:"梅花",point:"Q",text:"锁定技，①当此牌进入你的装备区时，你弃置一张不为【天机图】的牌；②当你失去装备区里的【天机图】时，你将手牌摸至五张。"},
  {name:"太公阴符",suit:"黑桃",point:"2",text:"①出牌阶段开始时，你可以选择一项：1.横置一名角色；2.重置一名角色；②出牌阶段结束时，你可以重铸一张手牌。"}
]
};
const PU_CATS=["武器","防具","宝物"];
const PU_SUIT={方块:"♦",红桃:"♥",黑桃:"♠",梅花:"♣"};
const puRed=s=>s==="方块"||s==="红桃";
const PU_RESULTS=[{label:"完美锻造",n:3,sub:"无人妨害·3张"},{label:"成功",n:2,sub:"助力≥妨害·2张"},{label:"失败",n:1,sub:"助力＜妨害·1张"}];
function puCardHtml(c,i,picked,clickable){
  const g=PU_SUIT[c.suit]||"", red=puRed(c.suit);
  return `<div style="border:1px solid ${picked?'var(--ok)':'var(--line)'};${picked?'box-shadow:0 0 0 2px var(--ok);':''}border-radius:8px;padding:8px 10px;margin-top:6px;background:rgba(255,252,244,.6)${clickable?';cursor:pointer':''}"${clickable?` data-pypick="${i}"`:""}>`
    +`<div style="display:flex;justify-content:space-between;align-items:baseline"><b style="font-size:15px;color:var(--seal-soft)">${esc(c.name)}</b>`
    +`<span style="font-weight:bold;color:${red?'var(--seal)':'var(--ink)'}">${g}${c.point}</span></div>`
    +`<div style="font-size:11px;color:var(--ink-soft)">${c.cat||''}${c.range?(' · 范围'+c.range):''}</div>`
    +`<div style="font-size:12px;color:var(--ink);margin-top:2px">${esc(c.text)}</div>`
    +(picked?`<div style="font-size:11px;color:var(--ok);font-weight:bold;text-align:right">✓ 锻造置入装备区</div>`:"")+`</div>`;
}
function puName(sn){ return esc(seatGeneralName(state.seats[sn]&&state.seats[sn].general)||('座位'+sn)); } // 武将名(编号→名);非工具将也解析
function puVotePool(vote){
  const es=Object.entries(vote.entries||{});
  const help=es.filter(([s,e])=>e.choice==="help"), hinder=es.filter(([s,e])=>e.choice==="hinder"), ab=es.filter(([s,e])=>e.choice==="abstain");
  const hs=help.reduce((a,[s,e])=>a+e.point,0), xs=hinder.reduce((a,[s,e])=>a+e.point,0);
  const line=arr=>arr.length?arr.map(([s,e])=>`${puName(+s)} <b>${e.point}</b>`).join("、"):`<span style="color:var(--ink-soft)">无</span>`;
  let out=`<div style="display:flex;gap:8px;margin-top:6px">`
    +`<div style="flex:1;border:1px solid var(--ok);border-radius:7px;padding:6px 8px"><div style="font-size:12px;color:var(--ok);font-weight:700">助力 · 点数和 ${hs}</div><div style="font-size:12px">${line(help)}</div></div>`
    +`<div style="flex:1;border:1px solid var(--seal);border-radius:7px;padding:6px 8px"><div style="font-size:12px;color:var(--seal);font-weight:700">妨害 · 点数和 ${xs}</div><div style="font-size:12px">${line(hinder)}</div></div></div>`;
  if(ab.length) out+=`<div class="hint" style="margin-top:4px">弃权：${ab.map(([s])=>puName(+s)).join("、")}</div>`;
  return out;
}
function viewPyTool(py){
  const ts=py.toolState||{}, iAm=state.youHold.includes(py.seatNo), puSeat=py.seatNo;
  const cat=ts.cat, active=ts.active||[], vote=ts.vote;
  let h=`<div class="card"><h2>蒲元 · 神工锻造库<span class="tag">锻造中 ${active.length} 件</span></h2>`;
  h+=`<div class="hint">选副类别 → 手动定结果，或发起助力/妨害征集（线下不翻牌）：其他玩家点助力/妨害，系统各 roll 1~13 点，蒲元揭示结算按点数和定完美(3)/成功(2)/失败(1)。锻造中的装备占库存不重复，销毁回池。</div>`;
  // ① 副类别
  if(iAm){
    h+=`<div class="hint" style="margin-top:8px;color:var(--qi)">① 选副类别（重选=一次新发动，清投票）</div><div class="row">`
      +PU_CATS.map(c=>`<button class="${cat===c?'primary':''}" data-pycat="${c}" style="flex:1">${c}</button>`).join("")+`</div>`;
  } else h+=`<div class="hint" style="margin-top:6px">${cat?`蒲元发动神工 · <b style="color:var(--seal)">${cat}</b>`:'蒲元本人操作，你只读。等蒲元发动神工。'}</div>`;
  // ② 手动模式(无投票)才显示手动按钮 + 发起征集
  if(iAm && !vote){
    const dis=cat?'':'disabled';
    h+=`<div class="hint" style="margin-top:8px;color:var(--qi)">② 锻造结果</div><div class="row">`
      +PU_RESULTS.map(r=>`<button ${dis} class="${ts.result&&!ts.result.viaVote&&ts.result.label===r.label?'primary':''}" data-pyforge="${r.label}" data-pyn="${r.n}" style="flex:1;line-height:1.2">${r.label}<br><span style="font-size:10px;color:var(--ink-soft)">${r.sub}</span></button>`).join("")+`</div>`;
    h+=`<div class="row" style="margin-top:6px"><button ${dis} class="gold" data-pystartvote style="flex:1">或：发起助力/妨害征集（线下不翻牌）</button></div>`;
  }
  // 投票面板(蒲元+旁人都可见,实时公开)
  if(vote){
    h+=`<div style="border:1px solid var(--qi);border-radius:8px;padding:8px 10px;margin-top:10px"><div style="font-size:13px;color:var(--qi);font-weight:700">助力/妨害征集 · ${vote.cat}${vote.settled?' · 已结算':' · 进行中'}</div>`;
    h+=puVotePool(vote);
    if(!vote.settled){
      const voted=new Set(Object.keys(vote.entries||{}).map(Number));
      const pending=dcInPlay().filter(s=>!voted.has(s)); // 含蒲元本人:全场都要表态
      if(pending.length) h+=`<div class="hint" style="margin-top:4px">待表态：${pending.map(s=>puName(s)).join("、")}</div>`;
      // 我持有的每个在座座位(含蒲元自己那座)都各自表态一次,选后不可改
      const myVoteSeats=state.youHold.filter(s=>state.seats[s] && state.seats[s].general && state.seats[s].general!=="none");
      myVoteSeats.forEach(s=>{ const e=(vote.entries||{})[s];
        if(e){
          const lab=e.choice==="help"?`已助力 <b>${e.point}</b>`:e.choice==="hinder"?`已妨害 <b>${e.point}</b>`:`已弃权`;
          h+=`<div class="row" style="margin-top:6px"><span class="hint grow" style="margin:0">${puName(s)}：${lab}（不可更改）</span></div>`;
        } else {
          h+=`<div class="row" style="margin-top:6px"><span class="hint grow" style="margin:0">${puName(s)}</span>`
            +`<button data-pyvote="help" data-pyseat="${s}">助力</button>`
            +`<button data-pyvote="hinder" data-pyseat="${s}">妨害</button>`
            +`<button class="ghost" data-pyvote="abstain" data-pyseat="${s}">弃权</button></div>`;
        }
      });
      if(iAm) h+=`<div class="row" style="margin-top:8px"><button class="primary grow" data-pysettle>揭示结算 → 生成装备</button></div>`;
    } else {
      h+=`<div class="hint" style="margin-top:6px">结算：助力 <b style="color:var(--ok)">${vote.helpSum}</b> vs 妨害 <b style="color:var(--seal)">${vote.hinderSum}</b> → <b>${ts.result.label}</b>（${ts.result.n}张${ts.result.short?('，仅剩'+ts.rolled.length):''}）</div>`;
      if(!ts.rolled.length) h+=`<div class="hint" style="margin-top:2px;color:var(--seal)">该类已全部锻造中，无可锻造——先销毁一件。</div>`;
    }
    h+=`</div>`;
  }
  // 手动模式库存全占提示
  if(iAm && !vote && cat && ts.result && !ts.rolled.length){
    h+=`<div class="hint" style="margin-top:8px"><b style="color:var(--seal)">${cat}</b> 已全部锻造中，无可锻造——先在下方销毁一件。</div>`;
  }
  // roll 出的候选(手动 or 投票结算后)——蒲元点选,旁人只读
  if(ts.rolled && ts.rolled.length){
    h+=`<div class="hint" style="margin-top:8px"><b>${cat}</b> · ${ts.result.label}（${ts.result.n}张${ts.result.short?('，库内仅剩'+ts.rolled.length+'张'):''}）`
      +(iAm?(ts.picked!=null?` → 已选定 <b>${esc(ts.rolled[ts.picked].name)}</b>`:' → 点一张锻造置入装备区'):'（候选）')+`</div>`;
    h+=ts.rolled.map((c,i)=>puCardHtml({...c,cat},i,ts.picked===i,iAm)).join("");
  }
  h+=`</div>`;
  // 锻造中的装备
  h+=`<div class="card"><h2>锻造中的装备（未销毁）<span class="tag">${active.length} 件</span></h2>`;
  if(!active.length) h+=`<div class="hint">尚无。锻造置入装备区后在此，${iAm?'点「销毁」':'蒲元可'}使其重回可锻造池。</div>`;
  else h+=active.map(f=>{const c=f.card,g=PU_SUIT[c.suit];
    return `<div class="row" style="border-bottom:1px dashed var(--line);padding:5px 0"><span style="font-size:11px;color:var(--ok);flex:0 0 auto">${f.cat}</span>`
      +`<b style="color:var(--seal-soft)">${esc(c.name)}</b><span style="color:${puRed(c.suit)?'var(--seal)':'var(--ink)'}">${g}${c.point}</span>`
      +`<span class="hint grow" style="margin:0">${esc(f.result)}${c.range?(' · 范围'+c.range):''}</span>`
      +(iAm?`<button class="ghost" data-pydestroy="${f.id}" style="font-size:12px;flex:0 0 auto">销毁</button>`:"")+`</div>`;
  }).join("");
  if(iAm) h+=`<div class="row" style="justify-content:flex-end;margin-top:8px"><button class="ghost" data-pyresetgame style="font-size:12px">重开</button></div>`;
  h+=`</div>`;
  if(ts.log&&ts.log.length) h+=`<div class="card"><h2>记录</h2><div class="loglist">`+ts.log.slice(0,20).map(l=>`<div>${esc(l)}</div>`).join("")+`</div></div>`;
  return h;
}
function bindPy(py,q){
  const P=py.seatNo, act=(o)=>send({type:"action",targetSeat:P,bySeat:P,toolAction:o});
  const voteAct=(seat,choice)=>send({type:"action",targetSeat:P,bySeat:Number(seat),toolAction:{type:"pyVote",choice}}); // 投票以投票者本座位为 bySeat
  q("[data-pycat]").forEach(b=>b.onclick=()=>act({type:"pySelCat",cat:b.dataset.pycat}));
  q("[data-pyforge]").forEach(b=>b.onclick=()=>act({type:"pyForge",label:b.dataset.pyforge,n:+b.dataset.pyn}));
  q("[data-pystartvote]").forEach(b=>b.onclick=()=>act({type:"pyStartVote"}));
  q("[data-pyvote]").forEach(b=>b.onclick=()=>voteAct(b.dataset.pyseat, b.dataset.pyvote));
  q("[data-pysettle]").forEach(b=>b.onclick=()=>act({type:"pySettle"}));
  q("[data-pypick]").forEach(b=>b.onclick=()=>act({type:"pyPick",i:+b.dataset.pypick}));
  q("[data-pydestroy]").forEach(b=>b.onclick=()=>act({type:"pyDestroy",id:b.dataset.pydestroy}));
  q("[data-pyresetgame]").forEach(b=>b.onclick=()=>{if(confirm("重开蒲元工具?清空锻造中的装备与记录（新局用）。"))act({type:"resetGame"});});
}

document.getElementById("rcNow").onclick=reconnectNow; // 断线横幅「立即重连」兜底按钮
loadHeroes(); // 拉 OL 武将库(点座位看技能)
render();
</script>
</body>
